name: Build App2

on:
  workflow_dispatch:
    inputs:
          environment:
            description: 'Entorno de despliegue'
            required: true
            default: 'dev'
            type: choice
            options:
              - dev
              - qa
              - prod

  push:
   branches:
     - main

jobs:

  build:

    runs-on: ubuntu-latest
    env:
      Solution_Name: your-solution-name                         # Replace with your solution name, i.e. MyWpfApp.sln.
      Test_Project_Path: your-test-project-path                 # Replace with the path to your test project, i.e. MyWpfApp.Tests\MyWpfApp.Tests.csproj.
      Wap_Project_Directory: your-wap-project-directory-name    # Replace with the Wap project directory relative to the solution, i.e. MyWpfApp.Package.
      Wap_Project_Path: your-wap-project-path                   # Replace with the path to your Wap project, i.e. MyWpf.App.Package\MyWpfApp.Package.wapproj.

    steps:
      # 1. Clonar el código del repositorio
      - name: Checkout del código
        uses: actions/checkout@v4

      # 2. Condicional: Imprimir el environment SOLO si es 'dev'
      # Nota: Cuando el workflow se activa por 'push', el input no existe, 
      # por lo que evaluamos si es 'dev' o si viene vacío (asumiendo dev por defecto).
      - name: Imprimir Environment (Solo DEV)
        if: |
          github.event.inputs.environment == 'dev' || 
          (github.event_name == 'push' && (github.event.inputs.environment == '' || github.event.inputs.environment == 'dev'))
        run: |
          echo "El entorno actual es: DEV"

      # 3. Simulación de Compilación (Ejemplo genérico)
      # Aquí puedes cambiarlo por 'dotnet build', 'npm run build', 'mvn package', etc.
      - name: Compilar Aplicación
        run: |
          mkdir build
          echo "Compilando la aplicación para el entorno: ${{ github.event.inputs.environment || 'dev' }}" > build/app-config.txt
          echo "Generando artefactos..." >> build/app-config.txt
          echo "¡Compilación completada con éxito!" >> build/app-config.txt

      # 4. Subir el artefacto al workflow
      # Esto guardará la carpeta 'build' para que puedas descargarla desde GitHub
      - name: Subir Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.event.inputs.environment || 'dev' }}
          path: build/
          retention-days: 5
